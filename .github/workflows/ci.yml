name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate conformance fixtures are valid JSON
        run: python3 -c "import json,glob,sys; [json.load(open(f)) for f in glob.glob('conformance/*.json')]; print('conformance JSON OK')"
