name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON fixtures and schemas
        run: python3 -c "import json,glob; [json.load(open(f)) for f in glob.glob('conformance/*.json') + glob.glob('schemas/*.json')]; print('spec JSON OK')"
